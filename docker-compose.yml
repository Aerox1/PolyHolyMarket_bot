# Multi-user Polymarket trading bot — local/prod orchestration.
#
# Security boundary: the `dashboard` service intentionally runs WITHOUT
# ENCRYPTION_KEY, so it cannot decrypt user private keys even if compromised.
# Only `bot` (and a future `worker`) hold ENCRYPTION_KEY.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmbot}
      # No default — compose refuses to start unless a strong password is set in
      # .env. (Never ship a working credential; the DB holds the encrypted key vault.)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (no default)}
      POSTGRES_DB: ${POSTGRES_DB:-pmbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Bind to loopback ONLY. The other services reach Postgres over the internal
    # compose network as `postgres:5432` (set DATABASE_URL host to `postgres`), so
    # the DB never needs to be published on 0.0.0.0 — doing so would expose the
    # encrypted wallet-key vault + admin hash to the host's whole network.
    ports:
      - "127.0.0.1:5432:5432"

  migrate:
    build: .
    # No Alembic versions are committed yet, so bootstrap creates the schema
    # (create_all) + the first admin. Once you generate migrations on Postgres
    # (alembic revision --autogenerate), switch this to: alembic upgrade head
    command: python -m db.bootstrap
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bot:
    build: .
    command: python -m bot.main
    env_file: .env          # has TELEGRAM_BOT_TOKEN + ENCRYPTION_KEY
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  dashboard:
    build: .
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port ${DASHBOARD_PORT:-8877}
    # NOTE: ENCRYPTION_KEY and GEMINI_API_KEY are deliberately NOT passed here —
    # the dashboard must not be able to decrypt wallet keys. Pass only what it needs.
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8877}
      DASHBOARD_COOKIE_SECURE: ${DASHBOARD_COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8877}:${DASHBOARD_PORT:-8877}"
    restart: unless-stopped

  webapp:
    build: .
    # Telegram Mini App: serves the React SPA + /api (bets) + /cards images.
    # Holds ENCRYPTION_KEY (signs real bets) + GEMINI_API_KEY (card images),
    # like the bot — and unlike the key-less dashboard.
    command: uvicorn webapp.app:app --host 0.0.0.0 --port ${WEBAPP_PORT:-8888}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEBAPP_PORT:-8888}:${WEBAPP_PORT:-8888}"
    volumes:
      - cards:/app/data/cards          # persist generated category images
    restart: unless-stopped

volumes:
  pgdata:
  cards:
