# Multi-user Polymarket trading bot — local/prod orchestration.
#
# Security boundary: the `dashboard` service intentionally runs WITHOUT
# ENCRYPTION_KEY, so it cannot decrypt user private keys even if compromised.
# Only `bot` (and a future `worker`) hold ENCRYPTION_KEY.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pmbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmbot}
      POSTGRES_DB: ${POSTGRES_DB:-pmbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  migrate:
    build: .
    command: sh -c "alembic upgrade head || python -m db.bootstrap"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bot:
    build: .
    command: python -m bot.main
    env_file: .env          # has TELEGRAM_BOT_TOKEN + ENCRYPTION_KEY
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  dashboard:
    build: .
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port ${DASHBOARD_PORT:-8877}
    # NOTE: ENCRYPTION_KEY deliberately NOT passed here — dashboard must not
    # be able to decrypt wallet keys. Pass only what it needs.
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8877}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8877}:${DASHBOARD_PORT:-8877}"
    restart: unless-stopped

volumes:
  pgdata:
